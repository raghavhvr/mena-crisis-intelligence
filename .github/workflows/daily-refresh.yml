name: Daily Pulse Refresh

on:
  schedule:
    - cron: '0 5 * * *'   # 05:00 UTC = 09:00 GST daily
  workflow_dispatch:       # allow manual trigger from Actions tab

jobs:
  collect:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests python-dotenv

      - name: Run collector
        env:
          NEWSAPI_KEY:          ${{ secrets.NEWSAPI_KEY }}
          GUARDIAN_KEY:         ${{ secrets.GUARDIAN_KEY }}
          TWITCH_CLIENT_ID:     ${{ secrets.TWITCH_CLIENT_ID }}
          TWITCH_CLIENT_SECRET: ${{ secrets.TWITCH_CLIENT_SECRET }}
        run: python scripts/collect.py

      - name: Commit and push data
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add public/pulse_data.json public/pulse_history.json public/signals_config.json
          git commit -m "chore: daily pulse refresh $(date -u +%Y-%m-%d)" || echo "Nothing to commit"
          git push
